      letter-spacing: 0.1em;

      box-shadow: 0 4px 20px rgba(192, 70, 60, 0.3);

    .link:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(192, 70, 60, 0.5);
    }
    
    .divider {

      opacity: 0.3;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;

      height: 1px;
      background: currentColor;
    }
    
    .or-text {

      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;

    .hearts {

    }
    
    .note {
